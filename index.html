<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spiel</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="animations.css">
</head>
<body>

<header>
  <h1>spiel</h1>
</header>

<section class="hero fade-up">
  <h2>Random Topics Worth Talking About</h2>
  <p>No fluff, no login, no limits.</p>
</section>

<div class="filters">
<button onclick="setCategory('all')">All</button>
<button onclick="setCategory('tech')">Tech</button>
<button onclick="setCategory('career')">Career</button>
<button onclick="setCategory('fun')">Fun</button>
</div>

<div class="card fade-in">
  <p id="topic">Click generate to start</p>
</div>

<button class="generate-btn" onclick="generateTopic()">Generate Topic</button>
<script>
const topics = {
  tech: [
    "Is AI replacing creativity?",
    "Will Web3 change the internet?",
    "Is cybersecurity the biggest threat today?"
  ],
  career: [
    "Is college still worth it?",
    "How important is networking?",
    "Should you switch careers often?"
  ],
  fun: [
    "Is pineapple on pizza acceptable?",
    "Would you live on Mars?",
    "Are video games addictive?"
  ]
};

let currentCategory = "all";

function setCategory(cat) {
  currentCategory = cat;
}

function generateTopic() {
  let pool = [];

  if (currentCategory === "all") {
    pool = Object.values(topics).flat();
  } else {
    pool = topics[currentCategory];
  }

  const topic = pool[Math.floor(Math.random() * pool.length)];
  document.getElementById("topic").innerText = topic;
}
</script>




</body>



</html>
