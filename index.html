<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spiel</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="animations.css">
</head>
<body>

<header>
  <h1>spiel</h1>
</header>

<section class="hero fade-up">
  <h2>Random Topics Worth Talking About</h2>
  <p>No fluff, no login, no limits.</p>
</section>

<div class="filters">
  <button>All</button>
  <button>Tech</button>
  <button>Career</button>
  <button>Fun</button>
</div>

<div class="card fade-in">
  <p id="topic">Click generate to start</p>
</div>

<button class="generate-btn" onclick="generateTopic()">Generate Topic</button>
<script>
const topics = {
  tech: [
    "Is AI replacing creativity?",
    "Will Web3 change the internet?",
    "Is cybersecurity the biggest threat today?"
  ],
  career: [
    "Is college still worth it?",
    "How important is networking?",
    "Should you switch careers often?"
  ],
  fun: [
    "Is pineapple on pizza acceptable?",
    "Would you live on Mars?",
    "Are video games addictive?"
  ]
};

function generateTopic() {
  const categories = Object.keys(topics);
  const randomCategory = categories[Math.floor(Math.random() * categories.length)];
  
  const selected = topics[randomCategory];
  const topic = selected[Math.floor(Math.random() * selected.length)];

  document.getElementById("topic").innerText = topic;
}
</script>






</body>



</html>
