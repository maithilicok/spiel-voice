<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spiel</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>spiel</h1>
</header>

<section class="hero">
  <h2>Random Topics Worth Talking About</h2>
  <p>No fluff, no login, no limits.</p>
</section>

<div class="filters">
  <button>All</button>
  <button>Tech</button>
  <button>Career</button>
  <button>Fun</button>
</div>

<div class="card">
  <p id="topic">Click generate to start</p>
</div>

<button class="generate-btn" onclick="generateTopic()">Generate Topic</button>
<script>
function generateTopic() {
  const topics = [
    "Is AI replacing creativity?",
    "Should social media be regulated?",
    "Is remote work the future?",
    "Do startups really change the world?"
  ];

  const random = topics[Math.floor(Math.random() * topics.length)];
  document.getElementById("topic").innerText = random;
}
</script>






</body>



</html>
